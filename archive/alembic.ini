; =====================================================================
; Travelers Archive — Alembic configuration
; =====================================================================
; Most settings are minimal because we drive the connection URL from
; app/config.py via alembic/env.py, not from this file. See env.py.

[alembic]
script_location = alembic

; Used by `alembic revision -m "..."` to name new files. We don't
; auto-generate from models (the schema is hand-written SQL), so this
; is just for any future hand-written revisions.
file_template = %%(rev)s_%%(slug)s

; Don't set sqlalchemy.url here — env.py reads DATABASE_PATH from the
; environment and constructs the URL at runtime.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
