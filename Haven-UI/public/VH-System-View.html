<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System View - Haven Galaxy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0b1120;
            color: #e8e4d9;
            overflow: hidden;
        }
        #map-container { width: 100vw; height: 100vh; position: relative; }
        #tooltip {
            position: absolute;
            background: rgba(20, 27, 61, 0.95);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(0, 194, 179, 0.5);
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 200;
        }

        /* ===== BREADCRUMB NAV ===== */
        #map-nav-bar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 120; display: flex; gap: 8px; align-items: center;
            background: rgba(20,27,61,0.95); backdrop-filter: blur(10px);
            border: 1px solid rgba(0,194,179,0.5); border-radius: 8px;
            padding: 8px 14px; color: #E0EEFB;
            font-family: 'Inter',-apple-system,system-ui,sans-serif; font-size: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
        }
        #map-nav-bar a {
            color: #7CD9EA; text-decoration: none; padding: 4px 10px;
            background: rgba(0,194,179,0.15); border: 1px solid rgba(0,194,179,0.4);
            border-radius: 5px; font-weight: 500;
        }

        /* ===== FOCUS CHIP ===== */
        #focus-filter-chip {
            display: none; position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
            z-index: 120; padding: 6px 12px; align-items: center;
            background: rgba(20,27,61,0.95); backdrop-filter: blur(10px);
            border: 1px solid rgba(0,194,179,0.5); border-radius: 8px;
            color: #E0EEFB; font-size: 12px; box-shadow: 0 4px 18px rgba(0,0,0,0.4);
        }

        /* ===== QUICK-NAV BUTTONS ===== */
        #back-link, #back-to-haven {
            position: fixed; bottom: 195px; z-index: 100;
        }
        #back-link  { left: 16px; }
        #back-to-haven { right: 16px; }
        .map-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 14px; border-radius: 8px; text-decoration: none;
            font-size: 12px; font-weight: 600; backdrop-filter: blur(10px);
            transition: opacity 0.2s; border: 1px solid;
        }
        .map-btn:hover { opacity: 0.85; }

        /* ===== MOBILE CONTROLS ===== */
        #mobile-controls { display: none; position: fixed; bottom: 280px; right: 10px; z-index: 100; }
        #mobile-controls .control-row { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        #mobile-controls button {
            width: 44px; height: 44px;
            background: rgba(80, 80, 80, 0.8); border: 2px solid rgba(100, 100, 100, 0.6);
            border-radius: 10px; color: #888; font-size: 16px; cursor: pointer;
            touch-action: manipulation;
        }
        #mobile-controls button.active { background: rgba(0,194,179,0.8); border-color: #00C2B3; color: white; }

        /* ===== BOTTOM SHEET ===== */
        #bottom-sheet {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
            background: rgba(8, 14, 28, 0.97);
            border-top: 1px solid rgba(0, 194, 179, 0.12);
            border-radius: 14px 14px 0 0;
            backdrop-filter: blur(18px);
            transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
            transform: translateY(calc(100% - 180px));
            display: flex; flex-direction: column; max-height: 82vh;
        }
        #bottom-sheet.expanded { transform: translateY(0); }

        .sh-toggle-area {
            cursor: pointer; padding: 10px 16px 0;
            flex-shrink: 0; user-select: none;
        }
        .sh-handle {
            width: 36px; height: 3px; border-radius: 2px;
            background: rgba(255,255,255,0.12); margin: 0 auto 12px;
        }

        /* Two-column header — Concept C layout */
        .sh-header {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 12px;
            flex-wrap: wrap; padding-bottom: 10px;
        }
        /* Title/tags take the full first row; glyph+coords block wraps to its
           own full-width row below and centers (above the centered cards). */
        .sh-header-left  { flex: 1 1 100%; min-width: 180px; }
        .sh-header-right { flex: 1 1 100%; text-align: center; }

        .sh-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .sh-sn { font-size: 20px; font-weight: 600; color: #e8e4d9; }
        .sh-grade {
            display: inline-flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 50%;
            font-size: 12px; font-weight: 600;
            border: 2px solid #778; color: #778; flex-shrink: 0;
        }
        .sh-tags { margin-bottom: 4px; min-height: 20px; }

        /* Right column */
        .sh-glyph-row {
            display: flex; align-items: center; gap: 6px;
            justify-content: center; margin-bottom: 3px; flex-wrap: nowrap;
        }
        .sh-glyph-squares { display: flex; gap: 2px; flex-wrap: nowrap; }
        .sh-gb {
            width: 18px; height: 18px; border-radius: 3px;
            background: rgba(0,194,179,0.06); border: 1px solid rgba(0,194,179,0.13);
            display: flex; align-items: center; justify-content: center;
            font-family: 'SF Mono', Consolas, monospace; font-size: 7px;
            color: #00c2b3; flex-shrink: 0;
        }
        .sh-gb img { width: 15px; height: 15px; object-fit: contain; display: block; }
        .sh-coord { font-family: 'SF Mono', Consolas, monospace; font-size: 9px; color: #4a6a5a; }
        .sh-disc  { font-size: 9px; color: #4a6a5a; }
        .sh-disc span { color: #00c2b3; }

        .sh-divider { border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 8px 0 0; }

        /* Tag variants */
        .tag { display: inline-block; font-size: 8px; padding: 2px 6px; border-radius: 8px; margin: 0 2px 2px 0; }
        .t-a { background: rgba(255,180,76,0.12);  color: #ffb44c; border: 1px solid rgba(255,180,76,0.15); }
        .t-t { background: rgba(0,194,179,0.12);   color: #00c2b3; border: 1px solid rgba(0,194,179,0.15); }
        .t-g { background: rgba(99,153,34,0.12);   color: #8bc44a; border: 1px solid rgba(99,153,34,0.15); }
        .t-r { background: rgba(226,75,74,0.1);    color: #e86b6a; border: 1px solid rgba(226,75,74,0.12); }
        .t-b { background: rgba(55,138,221,0.1);   color: #6aade8; border: 1px solid rgba(55,138,221,0.12); }
        .t-p { background: rgba(127,119,221,0.1);  color: #9b93e8; border: 1px solid rgba(127,119,221,0.12); }
        .t-x { background: rgba(255,255,255,0.04); color: #778;    border: 1px solid rgba(255,255,255,0.06); }

        /* ===== CARDS STRIP ===== */
        .sh-cards-wrap { overflow: hidden; flex: 1; min-height: 0; }
        .sh-cards {
            display: flex; gap: 8px;
            /* Center the cards when they fit; "safe" falls back to flex-start
               (and stays scrollable) when there are more than fit on screen. */
            justify-content: safe center;
            overflow-x: auto; overflow-y: hidden;
            /* Generous bottom buffer so the card row clears the screen edge /
               OS taskbar / mobile home indicator instead of sitting flush. */
            padding: 8px 16px max(60px, calc(env(safe-area-inset-bottom, 0px) + 28px));
            -webkit-overflow-scrolling: touch; height: 100%;
        }
        .sh-cards::-webkit-scrollbar { height: 3px; }
        .sh-cards::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        .p-card {
            min-width: 220px; max-width: 220px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-top: 2px solid #334; border-radius: 8px; padding: 10px 12px;
            flex-shrink: 0; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .p-card:hover { border-color: rgba(0,194,179,0.25); }
        .p-card.card-highlighted {
            border-color: rgba(0,194,179,0.6) !important;
            box-shadow: 0 0 14px rgba(0,194,179,0.22);
        }
        .p-card.biome-lush       { border-top-color: #639922; }
        .p-card.biome-scorched   { border-top-color: #d85a30; }
        .p-card.biome-toxic      { border-top-color: #534ab7; }
        .p-card.biome-frozen     { border-top-color: #378add; }
        .p-card.biome-irradiated { border-top-color: #90cc20; }
        .p-card.biome-dead       { border-top-color: #445; }
        .p-card.biome-exotic     { border-top-color: #cc44aa; }
        .p-card.biome-water      { border-top-color: #2060aa; }
        .p-card.biome-station    { border-top-color: #5588aa; }

        .p-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
        .p-name {
            font-size: 12px; font-weight: 500; color: #e8e4d9;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px;
        }
        .p-badge { font-size: 8px; padding: 2px 6px; border-radius: 8px; flex-shrink: 0; }
        .p-biome {
            font-size: 9px; color: #5a8a7a; margin-bottom: 5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .p-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin-bottom: 5px; }
        .ps { text-align: center; }
        .ps-v { font-size: 9px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ps-l { font-size: 7px; color: #4a6a5a; letter-spacing: 0.06em; text-transform: uppercase; }
        .p-res { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 4px; }
        .res { font-size: 7px; padding: 1px 5px; border-radius: 5px; }
        .r-c { background: rgba(122,136,153,0.12); color: #8a9aaa; }
        .r-u { background: rgba(106,173,232,0.12); color: #6aade8; }
        .r-r { background: rgba(255,180,76,0.12);  color: #ffb44c; }
        .r-p { background: rgba(139,196,74,0.12);  color: #8bc44a; }

        .view-discoveries-btn {
            display: inline-block; margin-top: 4px; padding: 4px 10px;
            background: rgba(0,194,179,0.1); border: 1px solid rgba(0,194,179,0.4);
            border-radius: 5px; color: #00C2B3; font-size: 10px;
            cursor: pointer; transition: background 0.2s;
        }
        .view-discoveries-btn:hover { background: rgba(0,194,179,0.3); }

        /* ===== DISCOVERIES MODAL ===== */
        #discoveries-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center;
            z-index: 400; padding: 20px;
        }
        #discoveries-modal.active { display: flex; }
        .discoveries-modal-content {
            background: rgba(20,27,61,0.98); border: 1px solid rgba(0,194,179,0.5);
            border-radius: 12px; max-width: 700px; width: 100%;
            max-height: 85vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .discoveries-modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; border-bottom: 1px solid rgba(0,194,179,0.3); flex-shrink: 0;
        }
        .discoveries-modal-header h2 { color: #00C2B3; font-size: 20px; margin: 0; }
        .close-modal {
            background: rgba(255,107,107,0.2); border: 1px solid #ff6b6b;
            border-radius: 4px; color: #ff6b6b; padding: 6px 12px; cursor: pointer; font-size: 14px;
        }
        .close-modal:hover { background: #ff6b6b; color: #fff; }
        .discoveries-modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .discovery-category { margin-bottom: 20px; }
        .discovery-category:last-child { margin-bottom: 0; }
        .discovery-category-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,217,61,0.3);
        }
        .discovery-category-header h3 { color: #ffd93d; font-size: 16px; margin: 0; }
        .discovery-category-count {
            background: rgba(255,217,61,0.2); color: #ffd93d;
            padding: 2px 8px; border-radius: 10px; font-size: 12px;
        }
        .discovery-card {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 12px; margin-bottom: 10px;
        }
        .discovery-card:last-child { margin-bottom: 0; }
        .discovery-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .discovery-card-name { font-weight: bold; color: #fff; font-size: 14px; }
        .discovery-card-details { font-size: 12px; color: #b0b0b0; }
        .discovery-card-details p { margin: 4px 0; }
        .discovery-card-details .detail-label { color: #888; }
        .no-discoveries { text-align: center; padding: 40px 20px; color: #888; font-style: italic; }
        .discovery-filter-bar {
            display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
            padding: 12px 20px; background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(0,194,179,0.2);
        }
        .discovery-filter-btn {
            width: 36px; height: 36px; border-radius: 6px;
            border: 2px solid rgba(0,194,179,0.5); background: rgba(0,0,0,0.3);
            cursor: pointer; font-size: 18px; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s; position: relative; flex-shrink: 0;
        }
        .discovery-filter-btn:hover { background: rgba(0,194,179,0.3); border-color: #00C2B3; transform: scale(1.1); }
        .discovery-filter-btn.active { background: rgba(0,194,179,0.5); border-color: #00C2B3; box-shadow: 0 0 10px rgba(0,194,179,0.5); }
        .discovery-filter-btn.empty { opacity: 0.3; filter: grayscale(100%); }
        .discovery-filter-btn .count-badge {
            position: absolute; top: -5px; right: -5px; background: #ff6b6b; color: white;
            font-size: 9px; font-weight: bold; min-width: 14px; height: 14px;
            border-radius: 7px; display: flex; align-items: center; justify-content: center; padding: 0 3px;
        }
        .discovery-filter-all { padding: 0 12px; width: auto; font-size: 11px; font-weight: bold; color: #00C2B3; }
        .discovery-filter-all.active { color: #fff; }

        @media (max-width: 768px) {
            .discovery-filter-bar {
                flex-wrap: nowrap; justify-content: flex-start;
                overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 12px 10px; gap: 8px;
            }
            #mobile-controls { display: block; }
        }
        @media (hover: hover) and (pointer: fine) {
            .discovery-filter-btn[title]::after {
                content: attr(title); position: absolute; bottom: -24px; left: 50%;
                transform: translateX(-50%); background: rgba(20,27,61,0.95); color: #fff;
                padding: 3px 6px; border-radius: 4px; font-size: 9px; white-space: nowrap;
                opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 200;
            }
            .discovery-filter-btn:hover::after { opacity: 1; }
        }
        /* ===== SCANNER HUD ===== */
        .scanner-hud {
            position: fixed; top: 80px; right: 16px;
            max-width: 380px; width: calc(100% - 32px); max-height: calc(100vh - 280px);
            background: rgba(8,14,28,0.97); border: 1px solid rgba(0,194,179,0.4);
            border-radius: 12px; z-index: 300; overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); backdrop-filter: blur(18px);
        }
        .shud-close {
            position: absolute; top: 10px; right: 12px;
            background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.4);
            color: #ff6b6b; border-radius: 6px; cursor: pointer;
            width: 28px; height: 28px; font-size: 18px; line-height: 1;
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .shud-close:hover { background: rgba(255,80,80,0.35); }
        #shud-content { overflow-y: auto; padding: 14px 16px; flex: 1; }
        .shud-header-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .shud-title { font-size: 16px; font-weight: 600; color: #e8e4d9; margin-bottom: 4px; margin-right: 32px; }
        .shud-subtitle { font-size: 11px; color: #5a8a7a; margin-bottom: 10px; }
        .shud-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .shud-stat { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; padding: 6px 8px; }
        .shud-stat-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.08em; color: #4a6a5a; margin-bottom: 2px; }
        .shud-stat-value { font-size: 11px; color: #e8e4d9; }
        .shud-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #00c2b3; margin: 10px 0 6px; }
        .shud-res-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .shud-special { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .shud-disc-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; }
        .shud-disc-name { font-size: 12px; font-weight: 500; color: #e8e4d9; }
        .shud-disc-meta { font-size: 10px; color: #5a8a7a; margin-top: 2px; }
        .shud-disc-thumb { max-width: 100%; border-radius: 6px; margin-top: 6px; }

        /* ===== SCROLL SNAP ===== */
        .sh-cards { scroll-snap-type: x mandatory; }
        .p-card { scroll-snap-align: start; }

        /* ===== SAFE AREA + MOBILE SCANNER ===== */
        #bottom-sheet { padding-bottom: env(safe-area-inset-bottom, 0px); }
        @media (max-width: 767px) {
            .scanner-hud {
                position: fixed; bottom: 0; left: 0; right: 0; top: auto;
                max-width: none; max-height: 75vh; border-radius: 16px 16px 0 0;
                padding-bottom: env(safe-area-inset-bottom, 0px);
            }
        }
    </style>
</head>
<body>
    <div id="map-container"></div>
    <div id="tooltip"></div>
    <div id="scanner-hud" class="scanner-hud" style="display:none;">
      <button class="shud-close" onclick="closeScanner()">×</button>
      <div id="shud-content"></div>
    </div>

    <!-- Breadcrumb nav (v1.68.0) -->
    <div id="map-nav-bar">
        <a id="map-nav-galaxy" href="/map/latest">↑ Galaxy</a>
        <a id="map-nav-region" href="#">↑ Region</a>
        <span style="opacity:0.6">›</span>
        <span style="opacity:0.85">⭐ <span id="map-nav-system-name"></span></span>
    </div>

    <!-- Focus tracking chip (v1.68.2) -->
    <div id="focus-filter-chip"></div>

    <!-- Quick-nav buttons positioned above the bottom sheet -->
    <div id="back-link">
        <a href="/map/latest" class="map-btn"
           style="background:rgba(0,194,179,0.9);border-color:#00C2B3;color:white;">
            <span>🌌</span> Galaxy Map
        </a>
    </div>
    <div id="back-to-haven">
        <a href="/haven-ui/" class="map-btn"
           style="background:rgba(157,78,221,0.9);border-color:#9d4edd;color:white;">
            <span>🏠</span> Haven
        </a>
    </div>

    <!-- Mobile controls -->
    <div id="mobile-controls">
        <div class="control-row">
            <button onclick="resetView()" title="Reset">🏠</button>
            <button id="mobile-btn-orbits" onclick="toggleOrbits();updateMobileOrbitBtn()" title="Orbits">🔄</button>
            <button id="mobile-btn-labels" onclick="toggleLabels();updateMobileLabelBtn()" title="Labels">🏷️</button>
            <button onclick="focusSun()" title="Sun">☀️</button>
        </div>
    </div>

    <!-- Bottom Sheet — Concept C layout -->
    <div id="bottom-sheet">
        <div class="sh-toggle-area" onclick="toggleSheet()">
            <div class="sh-handle"></div>
            <div class="sh-header">
                <!-- Left: name + grade + tags -->
                <div class="sh-header-left">
                    <div class="sh-title-row">
                        <span id="sh-name" class="sh-sn">Loading…</span>
                        <span id="sh-grade" class="sh-grade">C</span>
                    </div>
                    <div id="sh-tags" class="sh-tags"></div>
                </div>
                <!-- Right: glyph squares + coords + discoverer -->
                <div class="sh-header-right">
                    <div class="sh-glyph-row">
                        <div id="sh-glyphs" class="sh-glyph-squares"></div>
                        <span id="sh-coord" class="sh-coord"></span>
                    </div>
                    <div id="sh-discby" class="sh-disc"></div>
                </div>
            </div>
            <hr class="sh-divider">
        </div>
        <div class="sh-cards-wrap">
            <div id="sh-cards" class="sh-cards"></div>
        </div>
    </div>

    <!-- Discoveries Modal -->
    <div id="discoveries-modal">
        <div class="discoveries-modal-content">
            <div class="discoveries-modal-header">
                <h2 id="discoveries-modal-title">Discoveries</h2>
                <button class="close-modal" onclick="closeDiscoveriesModal()">&times; Close</button>
            </div>
            <div class="discovery-filter-bar" id="discovery-filter-bar"></div>
            <div class="discoveries-modal-body" id="discoveries-modal-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        window.SYSTEM_DATA = null;

        let scene, camera, renderer, controls;
        let sun, planets = [], moons = [], station = null;
        let orbitLines = [], labels = [];
        let raycaster, mouse;
        let showOrbits = true, showLabels = true, animateOrbits = true;
        let sunGlows = [], sunAnimTime = 0;

        const VISUAL_CONFIG = {
            SUN_RADIUS: 2,
            PLANET_BASE_SIZE: 0.75,
            MOON_SIZE: 0.28,
            ORBIT_SCALE: 5.5,
        };

        // ===== COLOUR HELPERS =====

        function getSunColors(starType) {
            const t = (starType || 'yellow').toLowerCase();
            if (t.includes('red'))    return { core: 0xffd0b0, inner: 0xff5500, outer: 0xcc2200, light: 0xff9966 };
            if (t.includes('green'))  return { core: 0xd0ffb0, inner: 0x44cc44, outer: 0x228822, light: 0x88ff88 };
            if (t.includes('blue'))   return { core: 0xd0e8ff, inner: 0x4488ff, outer: 0x2255dd, light: 0xaaccff };
            if (t.includes('purple')) return { core: 0xf0d0ff, inner: 0xaa44ee, outer: 0x7722cc, light: 0xddaaff };
            return { core: 0xfff8c0, inner: 0xffcc00, outer: 0xff8800, light: 0xfff0a0 };
        }

        function getBiomeClass(biome) {
            if (!biome) return '';
            const b = biome.toLowerCase();
            if (/lush|paradise|verdant|jungle|fertile|tropical/.test(b))       return 'biome-lush';
            if (/scorch|charr|infer|desert|arid|volcanic|burning|hot/.test(b)) return 'biome-scorched';
            if (/toxic|caustic|corros|fungal|infest|marsh|swamp|poison/.test(b)) return 'biome-toxic';
            if (/frozen|ice|arctic|tundra|blizzard|snow|polar|frigid/.test(b))  return 'biome-frozen';
            if (/irradiat|radioact|blasted|atomic/.test(b))                     return 'biome-irradiated';
            if (/dead|barren|lifeless|airless|empty|waste|slag/.test(b))        return 'biome-dead';
            if (/exotic|weird|anomal|dissonan|halluci/.test(b))                 return 'biome-exotic';
            if (/water|ocean|aquatic|marine|reef/.test(b))                      return 'biome-water';
            return '';
        }

        function getBiomeColor3D(cls) {
            const map = {
                'biome-lush': 0x3a7a25, 'biome-scorched': 0xc84a20,
                'biome-toxic': 0x4a3aaa, 'biome-frozen': 0x3070c8,
                'biome-irradiated': 0x80bb10, 'biome-dead': 0x706050,
                'biome-exotic': 0xaa3490, 'biome-water': 0x1850a0,
            };
            return map[cls] || null;
        }

        function getBiomeAtmColor3D(cls) {
            const map = {
                'biome-lush': 0x44aa44, 'biome-scorched': 0xff6633,
                'biome-toxic': 0x6655cc, 'biome-frozen': 0x55aaff,
                'biome-irradiated': 0xaaee44, 'biome-dead': 0x445544,
                'biome-exotic': 0xee44cc, 'biome-water': 0x2266cc,
            };
            return map[cls] || 0x4488aa;
        }

        function getPlanetSizeMult(sizeStr) {
            if (!sizeStr) return 1.0;
            const s = sizeStr.toLowerCase();
            if (/small|tiny|minor/.test(s)) return 0.65;
            if (/large|giant|huge|massive/.test(s)) return 1.35;
            return 1.0;
        }

        function getStatColor(value, field) {
            if (!value || value === '—' || value === 'N/A' || value === 'Unknown') return '#4a6a5a';
            const v = value.toLowerCase();
            if (field === 'sentinel') {
                if (/aggressive|hostile|frenzied|high|enforc|orthodoxy|pirate|brutal/.test(v)) return '#e86b6a';
                if (/low|minimal|none|passive|peaceful|absent/.test(v)) return '#8bc44a';
                return '#ffb44c';
            }
            if (/bountiful|ample|full|rich|abundant|lavish|copious|vibrant|plentiful|teeming|numerous|observant/.test(v)) return '#8bc44a';
            if (/none|absent|barren|empty|lacking|sparse|scarce|lifeless/.test(v)) return '#4a6a5a';
            if (/rare|few|limited|scattered|infrequent/.test(v)) return '#778';
            return '#ffb44c';
        }

        function getGradeStyle(grade) {
            const m = {
                S: 'border-color:#ffd700;color:#ffd700',
                A: 'border-color:#8bc44a;color:#8bc44a',
                B: 'border-color:#6aade8;color:#6aade8',
                C: 'border-color:#778;color:#778',
            };
            return m[grade] || m.C;
        }

        // ===== BOTTOM SHEET =====

        function toggleSheet()  { document.getElementById('bottom-sheet').classList.toggle('expanded'); }
        function expandSheet()  { document.getElementById('bottom-sheet').classList.add('expanded'); }

        function highlightCard(name) {
            document.querySelectorAll('.p-card').forEach(c => {
                c.classList.toggle('card-highlighted', c.dataset.bodyName === name);
                if (c.dataset.bodyName === name)
                    c.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
            });
        }

        let _focusedCardEl = null;
        function onCardClick(cardEl) {
            const bodyName = cardEl.dataset.bodyName;
            const isStation = cardEl.classList.contains('biome-station');
            const isMoon = cardEl.dataset.isMoon === 'true';

            // Resolve the matching 3D object so card + mesh focus stay in sync
            let target = null;
            if (isStation) {
                target = station;
            } else {
                const pool = isMoon ? moons : planets;
                target = pool.find(m => m.userData?.name === bodyName) || null;
            }

            // Second click on the already-focused card opens the Scanner HUD
            if (_focusedCardEl === cardEl) {
                if (target?.userData) openScanner(target.userData);
                return;
            }

            // First click: highlight the card + fly the camera to the body
            document.querySelectorAll('.p-card').forEach(c => c.classList.remove('card-highlighted'));
            cardEl.classList.add('card-highlighted');
            _focusedCardEl = cardEl;
            closeScanner();

            if (target) {
                flyToObject(target);
                _focusedObj = target;   // keep 3D-click second-tap state consistent
            }
        }

        function buildBottomSheet() {
            const sys = window.SYSTEM_DATA;
            if (!sys) return;

            document.getElementById('sh-name').textContent = sys.name || 'Unknown System';

            const gradeEl = document.getElementById('sh-grade');
            const grade = sys.completeness_grade || 'C';
            gradeEl.textContent = grade;
            gradeEl.style.cssText = getGradeStyle(grade);
            const existingScore = document.getElementById('sh-score');
            if (existingScore) existingScore.remove();
            if (sys.completeness_score != null) {
                const scoreEl = document.createElement('span');
                scoreEl.id = 'sh-score';
                scoreEl.style.cssText = 'font-size:9px;color:#4a6a5a;margin-left:2px;align-self:center';
                scoreEl.textContent = `${sys.completeness_score}%`;
                gradeEl.parentNode.insertBefore(scoreEl, gradeEl.nextSibling);
            }

            const tags = [];
            tags.push({ label: sys.galaxy || 'Euclid', cls: 't-t' });
            if (sys.star_type) tags.push({ label: sys.star_type, cls: 't-a' });
            if (sys.dominant_lifeform && sys.dominant_lifeform !== 'Unknown')
                tags.push({ label: sys.dominant_lifeform, cls: 't-t' });
            if (sys.economy_type && sys.economy_type !== 'Unknown' && sys.economy_type !== 'None')
                tags.push({ label: sys.economy_type, cls: 't-g' });
            if (sys.economy_level && sys.economy_level !== 'Unknown' && sys.economy_level !== 'None')
                tags.push({ label: sys.economy_level, cls: 't-g' });
            if (sys.conflict_level && sys.conflict_level !== 'Unknown' && sys.conflict_level !== 'None')
                tags.push({ label: sys.conflict_level, cls: 't-r' });
            if (sys.space_station) tags.push({ label: 'Station', cls: 't-b' });
            if (sys.reality && sys.reality !== 'Normal') tags.push({ label: sys.reality, cls: 't-x' });
            const regionName = sys.custom_region_name || sys.region_name;
            if (regionName) tags.push({ label: `📍 ${regionName}`, cls: 't-x' });

            document.getElementById('sh-tags').innerHTML =
                tags.map(t => `<span class="tag ${t.cls}">${escapeHtml(t.label)}</span>`).join('');

            buildGlyphSquares(sys.glyph_code);

            document.getElementById('sh-coord').textContent = `(${sys.x ?? 0}, ${sys.y ?? 0}, ${sys.z ?? 0})`;

            const who = sys.discovered_by || sys.personal_discord_username || 'Unknown';
            const civ = sys.discord_tag ? ` / ${sys.discord_tag}` : '';
            let discHtml = `Discovered by <span>${escapeHtml(who)}</span>${escapeHtml(civ)}`;
            const coauthors = sys.coauthors || [];
            if (coauthors.length) {
                const colist = coauthors.map(c => escapeHtml(c.username || String(c))).filter(Boolean).join(', ');
                discHtml += `<br><span style="color:#4a6a5a">Contributors:</span> <span>${colist}</span>`;
            }
            document.getElementById('sh-discby').innerHTML = discHtml;

            buildPlanetCards(sys.planets || [], sys.space_station);
            // Show the cards by default — they're the main point of opening a
            // system. Otherwise the sheet loads collapsed and the card row sits
            // below the viewport (you'd have to drag the handle up to see it).
            expandSheet();
        }
