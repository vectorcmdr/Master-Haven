        function buildGlyphSquares(code) {
            const el = document.getElementById('sh-glyphs');
            if (!code || code.length < 12) { el.innerHTML = ''; return; }
            el.innerHTML = Array.from(code.slice(0, 12)).map(d => {
                const k = d.toUpperCase();
                const src = GLYPH_IMG[k];
                return src
                    ? `<div class="sh-gb"><img src="${src}" alt="${k}" draggable="false"></div>`
                    : `<div class="sh-gb">${k}</div>`;
            }).join('');
        }

        function buildPlanetCards(list, stationData) {
            const container = document.getElementById('sh-cards');
            let html = list.map(p =>
                buildBodyCard(p, false) + (p.moons || []).map(m => buildBodyCard(m, true)).join('')
            ).join('');
            if (stationData) html += buildStationCard(stationData);
            if (!html) html = '<div style="color:#4a6a5a;font-size:12px;padding:8px 0">No planet data available</div>';
            container.innerHTML = html;
        }

        function buildBodyCard(data, isMoon) {
            const biomeClass = getBiomeClass(data.biome || data.biome_subtype || '');
            const rawName = data.name || (isMoon ? 'Unknown Moon' : 'Unknown Planet');
            const name = escapeHtml(rawName);
            const badgeCls = isMoon ? 't-r' : 't-g';
            const badgeLabel = isMoon ? 'Moon' : 'Planet';

            let biomeStr = data.biome || '';
            if (data.biome_subtype && data.biome_subtype !== data.biome)
                biomeStr += (biomeStr ? ' / ' : '') + data.biome_subtype;
            if (data.planet_size) biomeStr += (biomeStr ? ' / ' : '') + data.planet_size;

            const flora = data.flora || '—';
            const fauna = data.fauna || '—';
            const sent  = data.sentinel || '—';

            const resources = [];
            if (data.common_resource   && !/unknown/i.test(data.common_resource))
                resources.push(`<span class="res r-c">${escapeHtml(data.common_resource)}</span>`);
            if (data.uncommon_resource && !/unknown/i.test(data.uncommon_resource))
                resources.push(`<span class="res r-u">${escapeHtml(data.uncommon_resource)}</span>`);
            if (data.rare_resource     && !/unknown/i.test(data.rare_resource))
                resources.push(`<span class="res r-r">${escapeHtml(data.rare_resource)}</span>`);
            if (data.plant_resource    && !/unknown/i.test(data.plant_resource))
                resources.push(`<span class="res r-p">${escapeHtml(data.plant_resource)}</span>`);

            const specials = [];
            if (data.storm_crystals)              specials.push({ l: 'Storm crystals', c: 't-a' });
            if (data.ancient_bones)               specials.push({ l: 'Ancient bones',  c: 't-g' });
            if (data.salvageable_scrap)           specials.push({ l: 'Salvageable scrap', c: 't-a' });
            if (data.gravitino_balls)             specials.push({ l: 'Gravitino balls', c: 't-r' });
            if (data.vile_brood)                  specials.push({ l: 'Vile brood',     c: 't-r' });
            if (data.is_dissonant || data.dissonance) specials.push({ l: 'Dissonant', c: 't-p' });
            if (data.is_bubble)                   specials.push({ l: 'Bubble planet', c: 't-p' });
            if (data.is_floating_islands)         specials.push({ l: 'Floating islands', c: 't-t' });
            if (data.is_gas_giant)                specials.push({ l: 'Gas giant',     c: 't-x' });

            const discCount = (data.discoveries || []).length;
            const locationKey = (isMoon ? 'moon_' : 'planet_') + rawName.replace(/[^a-zA-Z0-9]/g, '_');
            if (discCount) {
                window._discoveryCache = window._discoveryCache || {};
                window._discoveryCache[locationKey] = { discoveries: data.discoveries, name: rawName };
            }

            let h = `<div class="p-card ${biomeClass}" data-body-name="${name}" data-is-moon="${isMoon}" onclick="onCardClick(this)">`;
            h += `<div class="p-head"><span class="p-name">${name}</span><span class="p-badge tag ${badgeCls}">${badgeLabel}</span></div>`;
            h += `<div class="p-biome">${escapeHtml(biomeStr) || '—'}</div>`;
            h += `<div class="p-stats">`;
            h += `<div class="ps"><div class="ps-v" style="color:${getStatColor(flora,'flora')}">${escapeHtml(flora)}</div><div class="ps-l">Flora</div></div>`;
            h += `<div class="ps"><div class="ps-v" style="color:${getStatColor(fauna,'fauna')}">${escapeHtml(fauna)}</div><div class="ps-l">Fauna</div></div>`;
            h += `<div class="ps"><div class="ps-v" style="color:${getStatColor(sent,'sentinel')}">${escapeHtml(sent)}</div><div class="ps-l">Sent</div></div>`;
            h += `</div>`;
            if (resources.length) h += `<div class="p-res">${resources.join('')}</div>`;
            if (specials.length)
                h += `<div>${specials.map(s => `<span class="tag ${s.c}" style="font-size:7px;padding:1px 4px">${escapeHtml(s.l)}</span>`).join('')}</div>`;
            if (discCount)
                h += `<div><button class="view-discoveries-btn" onclick="event.stopPropagation();openDiscoveriesFromCache('${locationKey}')">🔍 ${discCount} discover${discCount === 1 ? 'y' : 'ies'}</button></div>`;
            h += `</div>`;
            return h;
        }

        function buildStationCard(st) {
            const name = escapeHtml(st.name || 'Space Station');
            const race = escapeHtml(st.race || '—');
            let h = `<div class="p-card biome-station" data-body-name="${name}" data-is-moon="false" onclick="onCardClick(this)">`;
            h += `<div class="p-head"><span class="p-name">${name}</span><span class="p-badge tag t-b">Station</span></div>`;
            h += `<div class="p-biome">Space Station</div>`;
            h += `<div class="p-stats">`;
            h += `<div class="ps"><div class="ps-v" style="color:#ffb44c">${race}</div><div class="ps-l">Race</div></div>`;
            h += `<div class="ps"><div class="ps-v" style="color:#8bc44a">${st.sell_percent ?? 80}%</div><div class="ps-l">Sell</div></div>`;
            h += `<div class="ps"><div class="ps-v" style="color:#6aade8">${st.buy_percent ?? 50}%</div><div class="ps-l">Buy</div></div>`;
            h += `</div>`;
            const goodsCount = (st.trade_goods || []).length;
            if (goodsCount) h += `<div style="font-size:8px;color:#5a8a7a;margin-top:3px">${goodsCount} trade good${goodsCount !== 1 ? 's' : ''}</div>`;
            h += `</div>`;
            return h;
        }

        // ===== FOCUS / PULSE RING =====

        function parseSystemFocus() {
            const raw = new URLSearchParams(window.location.search).get('focus');
            if (!raw) return null;
            const idx = raw.indexOf(':');
            if (idx < 0) return null;
            const kind = raw.slice(0, idx).toLowerCase();
            const id   = raw.slice(idx + 1);
            if (['planet','moon','system'].includes(kind)) return { kind, id };
            return null;
        }

        let focusHighlightMesh = null;
        function dropFocusPulseRing(position, radius) {
            if (focusHighlightMesh) {
                if (focusHighlightMesh.animationFrame) cancelAnimationFrame(focusHighlightMesh.animationFrame);
                scene.remove(focusHighlightMesh);
                focusHighlightMesh.geometry.dispose();
                focusHighlightMesh.material.dispose();
                focusHighlightMesh = null;
            }
            const ri = (radius || 1) * 1.8, ro = ri + 0.4;
            const geo = new THREE.RingGeometry(ri, ro, 32);
            const mat = new THREE.MeshBasicMaterial({
                color: 0x00ff00, side: THREE.DoubleSide, transparent: true, opacity: 0.85
            });
            focusHighlightMesh = new THREE.Mesh(geo, mat);
            focusHighlightMesh.position.copy(position);
            focusHighlightMesh.lookAt(camera.position);
            scene.add(focusHighlightMesh);
            let pulse = 0;
            const tick = () => {
                if (!focusHighlightMesh) return;
                pulse += 0.05;
                const s = 1 + Math.sin(pulse) * 0.18;
                focusHighlightMesh.scale.set(s, s, s);
                focusHighlightMesh.material.opacity = 0.55 + Math.sin(pulse) * 0.25;
                focusHighlightMesh.lookAt(camera.position);
                focusHighlightMesh.animationFrame = requestAnimationFrame(tick);
            };
            tick();
        }

        // ===== INIT =====

        function init() {
            if (!window.SYSTEM_DATA) {
                document.getElementById('sh-name').textContent = 'No system data';
                return;
            }

            // Breadcrumb nav
            (function setupNav() {
                const sys = window.SYSTEM_DATA || {};
                const rx = sys.region_x, ry = sys.region_y, rz = sys.region_z;
                const focus = new URLSearchParams(window.location.search).get('focus');
                const upFocus = focus || (sys.id ? `system:${sys.id}` : null);
                const galLink = document.getElementById('map-nav-galaxy');
                const regLink = document.getElementById('map-nav-region');
                if (galLink) galLink.href = upFocus ? `/map/latest?focus=${encodeURIComponent(upFocus)}` : '/map/latest';
                if (regLink) {
                    if (rx != null) regLink.href = upFocus
                        ? `/map/region?rx=${rx}&ry=${ry}&rz=${rz}&focus=${encodeURIComponent(upFocus)}`
                        : `/map/region?rx=${rx}&ry=${ry}&rz=${rz}`;
                    else regLink.style.display = 'none';
                }
                const nameEl = document.getElementById('map-nav-system-name');
                if (nameEl) nameEl.textContent = sys.name || sys.glyph_code || 'System';
            })();

            // Tracking chip
            (async function setupTrackingChip() {
                const focus = new URLSearchParams(window.location.search).get('focus');
                const chip = document.getElementById('focus-filter-chip');
                if (!chip || !focus) return;
                const idx = focus.indexOf(':');
                if (idx < 0) return;
                const kind = focus.slice(0, idx).toLowerCase();
                const val  = focus.slice(idx + 1);
                const sys = window.SYSTEM_DATA || {};
                let label = '';
                if (kind === 'system') {
                    label = (sys.id && String(sys.id) === String(val))
                        ? `⭐ Tracking: ${sys.name || val}`
                        : `⭐ Tracking: ${val.slice(0, 12)}…`;
                    if (!(sys.id && String(sys.id) === String(val))) {
                        try {
                            const r = await fetch('/api/systems/' + encodeURIComponent(val));
                            if (r.ok) { const s = await r.json(); label = `⭐ Tracking: ${s.name || val} (not in this view)`; }
                        } catch {}
                    }
                } else if (kind === 'region') {
                    label = `📍 Tracking: Region (${val})`;
                } else if (kind === 'planet' || kind === 'moon') {
                    label = `${kind === 'moon' ? '🌑' : '🌍'} Tracking: ${val.slice(0, 12)}…`;
                } else return;
                chip.style.display = 'flex';
                chip.innerHTML = `<span style="opacity:0.85">${label}</span><button onclick="window.clearMapFocus()" style="margin-left:8px;background:rgba(255,80,80,0.12);border:1px solid rgba(255,80,80,0.4);color:#FFB0B0;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px">✕</button>`;
            })();

            window.clearMapFocus = function() {
                const url = new URL(window.location.href);
                url.searchParams.delete('focus');
                window.location.href = url.toString();
            };

            // Three.js setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0b1120);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 55);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('map-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 8;
            controls.maxDistance = 220;
            controls.target.set(0, 0, 0);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            createSun();
            createPlanets();
            createStation();
            createStarfield();
            buildBottomSheet();

            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('click', onClick);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
            renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
            renderer.domElement.addEventListener('touchend', onTouchEnd, { passive: false });

            // Apply focus pulse if URL has ?focus= param
            (function applyFocus() {
                const focus = parseSystemFocus();
                if (!focus || focus.kind === 'system') return;
                const pool = focus.kind === 'planet' ? planets : moons;
                const target = pool.find(m => m.userData?.data && String(m.userData.data.id) === String(focus.id));
                if (!target) return;
                showObjectInfo(target.userData);
                const radius = target.geometry?.parameters?.radius || 1;
                dropFocusPulseRing(target.position, radius);
                camera.position.set(target.position.x + 6, target.position.y + 4, target.position.z + 8);
                controls.target.copy(target.position);
                controls.update();
            })();

            animate();
        }

        // ===== SUN =====

        function makeSunGlowSprite(colors) {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            const half = size / 2;
            const toRgb = h => [(h >> 16) & 0xff, (h >> 8) & 0xff, h & 0xff];
            const [cr, cg, cb] = toRgb(colors.core);
            const [ir, ig, ib] = toRgb(colors.inner);
            const grad = ctx.createRadialGradient(half, half, 0, half, half, half);
            grad.addColorStop(0,    `rgba(${cr},${cg},${cb},0.9)`);
            grad.addColorStop(0.12, `rgba(${ir},${ig},${ib},0.55)`);
            grad.addColorStop(0.35, `rgba(${ir},${ig},${ib},0.18)`);
            grad.addColorStop(0.65, `rgba(${ir},${ig},${ib},0.04)`);
            grad.addColorStop(1,    `rgba(0,0,0,0)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({
                map: tex, transparent: true,
                blending: THREE.AdditiveBlending, depthWrite: false
            });
            const sprite = new THREE.Sprite(mat);
            const gs = VISUAL_CONFIG.SUN_RADIUS * 7;
            sprite.scale.set(gs, gs, 1);
            return sprite;
        }

        function createSun() {
            const colors = getSunColors(window.SYSTEM_DATA?.star_type || 'Yellow');

            sun = new THREE.Mesh(
                new THREE.SphereGeometry(VISUAL_CONFIG.SUN_RADIUS, 32, 32),
                new THREE.MeshBasicMaterial({ color: colors.core })
            );
            sun.userData = { type: 'sun', name: window.SYSTEM_DATA?.name || 'Star' };
            scene.add(sun);

            // Soft glow sprite (canvas radial gradient)
            const glowSprite = makeSunGlowSprite(colors);
            scene.add(glowSprite);
            sunGlows.push({ mesh: glowSprite, baseScale: VISUAL_CONFIG.SUN_RADIUS * 7, phase: 0, isSprite: true });

            // Three corona sphere layers
            [[1.28, 0.40, 0], [1.65, 0.19, 0.7], [2.3, 0.08, 1.4]].forEach(([scale, opacity, phase], i) => {
                const gMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(VISUAL_CONFIG.SUN_RADIUS * scale, 32, 32),
                    new THREE.MeshBasicMaterial({
                        color: i < 2 ? colors.inner : colors.outer,
                        transparent: true, opacity, depthWrite: false
                    })
                );
                scene.add(gMesh);
                sunGlows.push({ mesh: gMesh, baseOpacity: opacity, phase });
            });

            const light = new THREE.PointLight(colors.light, 1.6, 250);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x303040, 0.6));
        }

        // ===== PLANETS =====

        function createPlanets() {
            const list = window.SYSTEM_DATA.planets || [];
            const FALLBACK = [0x4ecdc4, 0x45b7d1, 0x96ceb4, 0xffeaa7, 0xdfe6e9, 0x74b9ff];

            list.forEach((pData, idx) => {
                const orbitRadius = (idx + 1) * VISUAL_CONFIG.ORBIT_SCALE + 6;
                const angle = (idx * 1.3 + Math.random() * 0.5) % (Math.PI * 2);
                const inclination = (Math.random() - 0.5) * 0.12; // gentle tilt off ecliptic
                const sizeMult = getPlanetSizeMult(pData.planet_size);
                const size = VISUAL_CONFIG.PLANET_BASE_SIZE * sizeMult;

                const biomeClass = getBiomeClass(pData.biome || pData.biome_subtype || '');
                const pColor  = getBiomeColor3D(biomeClass) || FALLBACK[idx % FALLBACK.length];
                const atmColor = getBiomeAtmColor3D(biomeClass);

                const planet = new THREE.Mesh(
                    new THREE.SphereGeometry(size, 32, 32),
                    new THREE.MeshPhongMaterial({ color: pColor, shininess: 28, specular: 0x222233 })
                );
                planet.position.set(orbitRadius * Math.cos(angle), orbitRadius * Math.sin(inclination) * Math.sin(angle * 0.7), orbitRadius * Math.sin(angle));
                planet.userData = {
                    type: 'planet', name: pData.name, data: pData,
                    orbitRadius, angle, inclination,
                    orbitSpeed: 0.0009 / (idx + 1)
                };
                scene.add(planet);
                planets.push(planet);

                // Atmosphere rim (additive blending for soft glow)
                const atm = new THREE.Mesh(
                    new THREE.SphereGeometry(size * 1.15, 32, 32),
                    new THREE.MeshBasicMaterial({
                        color: atmColor, transparent: true, opacity: 0.18,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    })
                );
                atm.raycast = () => {};
                planet.add(atm);

                // Orbit ellipse
                const pts = [];
                for (let i = 0; i <= 96; i++) {
                    const a = (i / 96) * Math.PI * 2;
                    pts.push(new THREE.Vector3(
                        orbitRadius * Math.cos(a),
                        orbitRadius * Math.sin(inclination) * Math.sin(a * 0.7),
                        orbitRadius * Math.sin(a)
                    ));
                }
                const orbitLine = new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints(pts),
                    new THREE.LineBasicMaterial({ color: 0x00C2B3, transparent: true, opacity: 0.22 })
                );
                scene.add(orbitLine);
                orbitLines.push(orbitLine);

                // Moons
                (pData.moons || []).forEach((mData, mi) => {
                    const moonOrbit = size * 2.8 + 2 + mi * 1.6;
                    const moonAngle = Math.random() * Math.PI * 2;
                    const moonTilt  = (Math.random() - 0.5) * 0.3;
                    const moonColor = 0x888899 + mi * 0x050504; // subtle variation
                    const moon = new THREE.Mesh(
                        new THREE.SphereGeometry(VISUAL_CONFIG.MOON_SIZE, 16, 16),
                        new THREE.MeshPhongMaterial({ color: moonColor, shininess: 8 })
                    );
                    moon.userData = {
                        type: 'moon', name: mData.name, data: mData,
                        parentPlanet: planet, orbitRadius: moonOrbit,
                        orbitSpeed: 0.01 + mi * 0.002, angle: moonAngle, tilt: moonTilt
                    };
                    scene.add(moon);
                    moons.push(moon);
                    updateMoonPos(moon);
                });
            });
        }

        function updateMoonPos(moon) {
            const p = moon.userData.parentPlanet;
            const r = moon.userData.orbitRadius;
            const a = moon.userData.angle;
            const t = moon.userData.tilt;
            moon.position.set(
                p.position.x + r * Math.cos(a),
                p.position.y + r * Math.sin(t) * Math.sin(a),
                p.position.z + r * Math.sin(a)
            );
        }

        // ===== SPACE STATION =====

        function createStation() {
            const st = window.SYSTEM_DATA?.space_station;
            if (!st) return;

            station = new THREE.Group();
            station.userData = { type: 'station', name: st.name || 'Space Station', data: st };

            // Main body — thick cylinder hull
            station.add(new THREE.Mesh(
                new THREE.CylinderGeometry(0.55, 0.55, 2.0, 16),
                new THREE.MeshPhongMaterial({ color: 0x8899aa, flatShading: true })
            ));

            // Rotating docking ring
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(1.0, 0.13, 8, 28),
                new THREE.MeshPhongMaterial({ color: 0x6688aa })
            );
            station.add(ring);

            // Four structural arms
            for (let i = 0; i < 4; i++) {
                const angle = (i / 4) * Math.PI * 2;
                const arm = new THREE.Mesh(
                    new THREE.BoxGeometry(0.10, 0.10, 0.9),
                    new THREE.MeshPhongMaterial({ color: 0x556677 })
                );
                arm.position.set(Math.cos(angle) * 1.0, 0, Math.sin(angle) * 1.0);
                arm.rotation.y = -angle;
                station.add(arm);
            }

            // Antenna spike on top
            const antenna = new THREE.Mesh(
                new THREE.CylinderGeometry(0.03, 0.06, 0.8, 8),
                new THREE.MeshPhongMaterial({ color: 0x99aacc })
            );
            antenna.position.set(0, 1.2, 0);
            station.add(antenna);

            station.position.set(18, 6, 12);
            scene.add(station);
        }

        // ===== STARFIELD =====

        function createStarfield() {
            const pos = [];
            const col = [];
            for (let i = 0; i < 700; i++) {
                pos.push((Math.random() - 0.5) * 500, (Math.random() - 0.5) * 500, (Math.random() - 0.5) * 500);
                // Slight colour variation: mostly white, occasionally warm/cool
                const c = Math.random();
                if (c < 0.15)      col.push(0.9, 0.85, 0.7);  // warm
                else if (c < 0.25) col.push(0.75, 0.85, 1.0);  // cool blue
                else               col.push(1, 1, 1);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('color',    new THREE.Float32BufferAttribute(col, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
                vertexColors: true, size: 0.45, transparent: true, opacity: 0.85
            })));
        }

        // ===== ANIMATION =====

        function animate() {
            requestAnimationFrame(animate);

            sunAnimTime += 0.018;
            sunGlows.forEach(g => {
                const pulse = Math.sin(sunAnimTime + g.phase);
                if (g.isSprite) {
                    const s = g.baseScale * (1 + pulse * 0.06);
                    g.mesh.scale.set(s, s, 1);
                    g.mesh.material.opacity = 0.85 + pulse * 0.1;
                } else {
                    g.mesh.material.opacity = g.baseOpacity * (0.82 + pulse * 0.18);
                    const s = 1 + pulse * 0.04;
                    g.mesh.scale.set(s, s, s);
                }
            });

            if (animateOrbits) {
                planets.forEach(planet => {
                    planet.userData.angle += planet.userData.orbitSpeed;
                    const r = planet.userData.orbitRadius;
                    const a = planet.userData.angle;
                    const inc = planet.userData.inclination;
                    planet.position.x = r * Math.cos(a);
                    planet.position.y = r * Math.sin(inc) * Math.sin(a * 0.7);
                    planet.position.z = r * Math.sin(a);
                    planet.rotation.y += 0.003;
                });
                moons.forEach(moon => {
                    moon.userData.angle += moon.userData.orbitSpeed;
                    updateMoonPos(moon);
                });
                if (station) station.rotation.y += 0.006;
            }

            updateFlyTo(0.016);
            controls.update();
            renderer.render(scene, camera);
        }

        // ===== INTERACTION =====

        function getPickedObject(cx, cy) {
            mouse.x = (cx / window.innerWidth) * 2 - 1;
            mouse.y = -(cy / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const objects = [sun, ...planets, ...moons];
            if (station) objects.push(station);
            const hits = raycaster.intersectObjects(objects, true);
            if (!hits.length) return null;
            let obj = hits[0].object;
            while (obj && !obj.userData?.type && obj.parent && obj.parent !== scene) obj = obj.parent;
            return obj?.userData?.type ? obj : null;
        }

        let _flyTarget = null, _flyStart = null, _flyDuration = 0, _flyElapsed = 0;
        let _flyLookStart = null, _flyLookEnd = null;

        function flyToObject(obj) {
            const pos = obj.position.clone();
            const offset = pos.clone().normalize().multiplyScalar(8);
            _flyTarget = pos.clone().add(offset.y < 2 ? offset.set(offset.x, 4, offset.z) : offset);
            _flyStart = camera.position.clone();
            // Smoothly swing the look-at point too. Snapping controls.target
            // instantly (the old behaviour) made the view jerk to face the new
            // body on frame 1 before the position glide even started — that was
            // the "snappy redirection". Now both the camera position AND the
            // orbit target ease over the same 1.2s, so it's one fluid move.
            _flyLookStart = controls.target.clone();
            _flyLookEnd = pos.clone();
            _flyDuration = 1.2;
            _flyElapsed = 0;
        }

        function updateFlyTo(dt) {
            if (!_flyTarget) return;
            _flyElapsed += dt;
            const t = Math.min(_flyElapsed / _flyDuration, 1);
            const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
            camera.position.lerpVectors(_flyStart, _flyTarget, ease);
            if (_flyLookStart && _flyLookEnd) controls.target.lerpVectors(_flyLookStart, _flyLookEnd, ease);
            if (t >= 1) { _flyTarget = null; _flyLookStart = null; _flyLookEnd = null; }
        }

        function showObjectInfo(userData) {
            if (!userData?.type) return;
            expandSheet();
            if (['planet','moon','station'].includes(userData.type)) highlightCard(userData.name);
        }

        let _focusedObj = null;
        function onClick(e) {
            const o = getPickedObject(e.clientX, e.clientY);
            if (!o) { closeScanner(); _focusedObj = null; return; }
            if (_focusedObj === o) {
                openScanner(o.userData);
            } else {
                closeScanner();
                showObjectInfo(o.userData);
                flyToObject(o);
                _focusedObj = o;
            }
        }
        function onMouseMove(e)  {
            const obj = getPickedObject(e.clientX, e.clientY);
            const tip = document.getElementById('tooltip');
            if (obj) {
                tip.textContent = obj.userData.name || obj.userData.type;
                tip.style.cssText = `display:block;left:${e.clientX+15}px;top:${e.clientY+15}px`;
            } else {
                tip.style.display = 'none';
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function resetView()   { camera.position.set(0, 30, 55); controls.target.set(0, 0, 0); }
        function toggleOrbits() { showOrbits = !showOrbits; orbitLines.forEach(l => l.visible = showOrbits); }
        function toggleLabels() { showLabels = !showLabels; labels.forEach(l => l.visible = showLabels); }
        function focusSun()    { controls.target.set(0, 0, 0); camera.position.set(0, 10, 20); }
        function updateMobileOrbitBtn() { document.getElementById('mobile-btn-orbits')?.classList.toggle('active', showOrbits); }
        function updateMobileLabelBtn() { document.getElementById('mobile-btn-labels')?.classList.toggle('active', showLabels); }

        // ===== TOUCH =====

        let touchStartTime = 0, touchStartPos = {x:0,y:0}, isTouchDragging = false;
        let touchCount = 0, lastPinchDistance = 0;

        function onTouchStart(e) {
            touchCount = e.touches.length;
            touchStartTime = Date.now();
            if (touchCount === 1) {
                touchStartPos.x = e.touches[0].clientX;
                touchStartPos.y = e.touches[0].clientY;
                isTouchDragging = false;
            } else if (touchCount === 2) {
                lastPinchDistance = getPinchDist(e.touches);
            }
        }
        function onTouchMove(e) {
            e.preventDefault();
            if (touchCount === 1 && e.touches.length === 1) {
                const dx = e.touches[0].clientX - touchStartPos.x;
                const dy = e.touches[0].clientY - touchStartPos.y;
                if (Math.abs(dx) > 10 || Math.abs(dy) > 10) isTouchDragging = true;
            } else if (e.touches.length === 2) {
                const cur = getPinchDist(e.touches);
                const delta = cur - lastPinchDistance;
                if (Math.abs(delta) > 2) {
                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);
                    camera.position.addScaledVector(dir, delta > 0 ? 2 : -2);
                    lastPinchDistance = cur;
                }
            }
        }
        function onTouchEnd(e) {
            if (touchCount === 1 && !isTouchDragging && Date.now() - touchStartTime < 300) {
                const t = e.changedTouches[0];
                const obj = getPickedObject(t.clientX, t.clientY);
                if (obj) {
                    if (_focusedObj === obj) { openScanner(obj.userData); }
                    else { closeScanner(); showObjectInfo(obj.userData); flyToObject(obj); _focusedObj = obj; }
                } else { closeScanner(); _focusedObj = null; }
            }
            touchCount = e.touches.length;
            if (touchCount === 0) isTouchDragging = false;
        }
        function getPinchDist(ts) {
            const dx = ts[0].clientX - ts[1].clientX, dy = ts[0].clientY - ts[1].clientY;
            return Math.sqrt(dx*dx + dy*dy);
        }

        // ===== UTILITIES =====

        function escapeHtml(text) {
            if (!text) return '';
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
        function getPhotoUrl(photo) {
            if (!photo) return null;
            if (photo.startsWith('http')) return photo;
            const parts = photo.replace(/\\/g, '/').split('/');
            return '/haven-ui-photos/' + encodeURIComponent(parts[parts.length - 1]);
        }

        // ===== SCANNER HUD =====

        function closeScanner() {
            document.getElementById('scanner-hud').style.display = 'none';
        }

        function openScanner(userData) {
            if (!userData?.type || userData.type === 'sun') return;
            const hud = document.getElementById('scanner-hud');
            const content = document.getElementById('shud-content');
            const data = userData.data || {};
            let html = '';

            if (userData.type === 'station') {
                html += `<div class="shud-title">${escapeHtml(userData.name)}</div>`;
                html += `<div class="shud-subtitle">Space Station</div>`;
                html += `<div class="shud-stats">`;
                if (data.race) html += `<div class="shud-stat"><div class="shud-stat-label">Race</div><div class="shud-stat-value" style="color:#ffb44c">${escapeHtml(data.race)}</div></div>`;
                if (data.sell_percent != null) html += `<div class="shud-stat"><div class="shud-stat-label">Sell %</div><div class="shud-stat-value" style="color:#8bc44a">${data.sell_percent}%</div></div>`;
                if (data.buy_percent  != null) html += `<div class="shud-stat"><div class="shud-stat-label">Buy %</div><div class="shud-stat-value" style="color:#6aade8">${data.buy_percent}%</div></div>`;
                html += `</div>`;
                const goods = data.trade_goods || [];
                if (goods.length) {
                    html += `<div class="shud-section-title">Trade Goods (${goods.length})</div>`;
                    goods.forEach(g => {
                        const gname = escapeHtml(g.name || g.item_name || (typeof g === 'string' ? g : ''));
                        html += `<div class="shud-disc-card"><div class="shud-disc-name">${gname}</div>`;
                        if (g.buy_price || g.sell_price) html += `<div class="shud-disc-meta">Buy: ${g.buy_price ?? '—'} / Sell: ${g.sell_price ?? '—'}</div>`;
                        html += `</div>`;
                    });
                }
            } else if (userData.type === 'discovery') {
                const DISC_EMOJI = { fauna:'🦗', flora:'🌿', mineral:'💎', starship:'🚀', multitool:'⚙️', ancient:'🏛️', bones:'🦴', anomaly:'👽', ruins:'🏛️', log:'📜' };
                const emoji = DISC_EMOJI[data.discovery_type] || '📖';
                const photoUrl = getPhotoUrl(data.photo_url);
                if (photoUrl) html += `<img src="${photoUrl}" alt="" class="shud-header-img" onerror="this.style.display='none'">`;
                html += `<div class="shud-title">${emoji} ${escapeHtml(data.discovery_name || userData.name || 'Unknown')}</div>`;
                html += `<div class="shud-subtitle" style="text-transform:capitalize">${escapeHtml(data.discovery_type || 'Discovery')}</div>`;

                // Type-specific metadata
                if (data.type_metadata) {
                    try {
                        const tm = typeof data.type_metadata === 'string' ? JSON.parse(data.type_metadata) : data.type_metadata;
                        const META_LABELS = {
                            species_name:'Species', behavior:'Behavior', biome:'Biome',
                            resource_type:'Resource', deposit_richness:'Richness',
                            ship_type:'Ship Type', ship_class:'Class',
                            tool_type:'Tool Type', age_era:'Era',
                            associated_race:'Race', species_type:'Type', estimated_age:'Age',
                            lore_notes:'Notes',
                        };
                        html += `<div class="shud-stats">`;
                        Object.entries(META_LABELS).forEach(([k, label]) => {
                            if (tm[k]) html += `<div class="shud-stat"><div class="shud-stat-label">${label}</div><div class="shud-stat-value">${escapeHtml(tm[k])}</div></div>`;
                        });
                        html += `</div>`;
                    } catch {}
                }

                if (data.description) {
                    html += `<div class="shud-section-title">Description</div><div style="font-size:11px;color:#7a9a8a;margin-bottom:8px">${escapeHtml(data.description)}</div>`;
                }
                if (data.location_name) {
                    html += `<div class="shud-section-title">Location</div><div style="font-size:11px;color:#7a9a8a;margin-bottom:4px">${escapeHtml(data.location_name)}</div>`;
                }
                if (data.latitude != null || data.longitude != null) {
                    const lat = data.latitude  != null ? Number(data.latitude).toFixed(4)  : '—';
                    const lng = data.longitude != null ? Number(data.longitude).toFixed(4) : '—';
                    html += `<div style="font-size:11px;color:#7a9a8a;font-family:monospace;margin-bottom:8px">${lat}, ${lng}</div>`;
                }
                if (data.discovered_by) {
                    html += `<div class="shud-section-title">Discovered By</div><div style="font-size:11px;color:#7a9a8a;margin-bottom:8px">${escapeHtml(data.discovered_by)}</div>`;
                }
                if (data.evidence_urls) {
                    let evUrls = data.evidence_urls;
                    if (typeof evUrls === 'string') { try { evUrls = JSON.parse(evUrls); } catch { evUrls = [evUrls]; } }
                    if (Array.isArray(evUrls) && evUrls.length) {
                        html += `<div class="shud-section-title">Evidence (${evUrls.length})</div>`;
                        evUrls.forEach(u => {
                            const thumbUrl = getPhotoUrl(u);
                            if (thumbUrl) html += `<img src="${thumbUrl}" alt="" class="shud-disc-thumb" onerror="this.style.display='none'" style="margin:2px">`;
                        });
                    }
                }

            } else {
                // Planet or moon
                const photoUrl = getPhotoUrl(data.photo_url || data.photo);
                if (photoUrl) html += `<img src="${photoUrl}" alt="" class="shud-header-img" onerror="this.style.display='none'">`;

                let biomeStr = data.biome || '';
                if (data.biome_subtype && data.biome_subtype !== data.biome) biomeStr += (biomeStr ? ' / ' : '') + data.biome_subtype;
                if (data.planet_size) biomeStr += (biomeStr ? ' · ' : '') + data.planet_size;

                html += `<div class="shud-title">${escapeHtml(userData.name)}</div>`;
                html += `<div class="shud-subtitle">${escapeHtml(biomeStr || '—')}</div>`;

                html += `<div class="shud-stats">`;
                if (data.flora  || data.flora_text)     html += `<div class="shud-stat"><div class="shud-stat-label">Flora</div><div class="shud-stat-value" style="color:${getStatColor(data.flora,'flora')}">${escapeHtml(data.flora_text  || data.flora  || '—')}</div></div>`;
                if (data.fauna  || data.fauna_text)     html += `<div class="shud-stat"><div class="shud-stat-label">Fauna</div><div class="shud-stat-value" style="color:${getStatColor(data.fauna,'fauna')}">${escapeHtml(data.fauna_text  || data.fauna  || '—')}</div></div>`;
                if (data.sentinel || data.sentinels_text) html += `<div class="shud-stat"><div class="shud-stat-label">Sentinel</div><div class="shud-stat-value" style="color:${getStatColor(data.sentinel,'sentinel')}">${escapeHtml(data.sentinels_text || data.sentinel || '—')}</div></div>`;
                if (data.weather  || data.weather_text) html += `<div class="shud-stat"><div class="shud-stat-label">Weather</div><div class="shud-stat-value" style="color:#6aade8">${escapeHtml(data.weather_text  || data.weather  || '—')}</div></div>`;
                if (data.storm_frequency) html += `<div class="shud-stat"><div class="shud-stat-label">Storms</div><div class="shud-stat-value">${escapeHtml(data.storm_frequency)}</div></div>`;
                if (data.flora_count  != null) html += `<div class="shud-stat"><div class="shud-stat-label">Flora Count</div><div class="shud-stat-value">${data.flora_count}</div></div>`;
                if (data.fauna_count  != null) html += `<div class="shud-stat"><div class="shud-stat-label">Fauna Count</div><div class="shud-stat-value">${data.fauna_count}</div></div>`;
                if (data.hazard_temperature) html += `<div class="shud-stat"><div class="shud-stat-label">Temp Hazard</div><div class="shud-stat-value">${escapeHtml(data.hazard_temperature)}</div></div>`;
                if (data.hazard_radiation)   html += `<div class="shud-stat"><div class="shud-stat-label">Radiation</div><div class="shud-stat-value">${escapeHtml(data.hazard_radiation)}</div></div>`;
                if (data.hazard_toxicity)    html += `<div class="shud-stat"><div class="shud-stat-label">Toxicity</div><div class="shud-stat-value">${escapeHtml(data.hazard_toxicity)}</div></div>`;
                if (data.building_density)   html += `<div class="shud-stat"><div class="shud-stat-label">Buildings</div><div class="shud-stat-value">${escapeHtml(data.building_density)}</div></div>`;
                html += `</div>`;

                // Resources
                const res = [];
                if (data.common_resource   && !/unknown/i.test(data.common_resource))   res.push(`<span class="res r-c">${escapeHtml(data.common_resource)}</span>`);
                if (data.uncommon_resource && !/unknown/i.test(data.uncommon_resource)) res.push(`<span class="res r-u">${escapeHtml(data.uncommon_resource)}</span>`);
                if (data.rare_resource     && !/unknown/i.test(data.rare_resource))     res.push(`<span class="res r-r">${escapeHtml(data.rare_resource)}</span>`);
                if (data.plant_resource    && !/unknown/i.test(data.plant_resource))    res.push(`<span class="res r-p">${escapeHtml(data.plant_resource)}</span>`);
                if (res.length) {
                    html += `<div class="shud-section-title">Resources</div><div class="shud-res-row">${res.join('')}</div>`;
                }

                // Special features
                const specials = [];
                if (data.exotic_trophy)                     specials.push({ l: `Trophy: ${data.exotic_trophy}`, c: 't-p' });
                if (data.storm_crystals)                    specials.push({ l: 'Storm crystals',  c: 't-a' });
                if (data.ancient_bones)                     specials.push({ l: 'Ancient bones',   c: 't-g' });
                if (data.salvageable_scrap)                 specials.push({ l: 'Salvageable scrap', c: 't-a' });
                if (data.gravitino_balls)                   specials.push({ l: 'Gravitino balls', c: 't-r' });
                if (data.vile_brood)                        specials.push({ l: 'Vile brood',      c: 't-r' });
                if (data.is_dissonant || data.dissonance)   specials.push({ l: 'Dissonant',       c: 't-p' });
                if (data.is_bubble)                         specials.push({ l: 'Bubble planet',   c: 't-p' });
                if (data.is_floating_islands)               specials.push({ l: 'Floating islands', c: 't-t' });
                if (data.is_gas_giant)                      specials.push({ l: 'Gas giant',       c: 't-x' });
                if (data.water_world)                       specials.push({ l: 'Water world',     c: 't-b' });
                if (data.has_rings)                         specials.push({ l: 'Has rings',       c: 't-b' });
                if (specials.length) {
                    html += `<div class="shud-section-title">Special Features</div>`;
                    html += `<div class="shud-special">${specials.map(s => `<span class="tag ${s.c}" style="font-size:8px">${escapeHtml(s.l)}</span>`).join('')}</div>`;
                }

                if (data.base_location) {
                    html += `<div class="shud-section-title">Base</div><div style="font-size:11px;color:#7a9a8a;margin-bottom:8px">${escapeHtml(data.base_location)}</div>`;
                }
                if (data.latitude != null || data.longitude != null) {
                    const lat = data.latitude  != null ? Number(data.latitude).toFixed(4)  : '—';
                    const lng = data.longitude != null ? Number(data.longitude).toFixed(4) : '—';
                    html += `<div class="shud-section-title">Surface Coordinates</div><div style="font-size:11px;color:#7a9a8a;font-family:monospace;margin-bottom:8px">${lat}, ${lng}</div>`;
                }
                if (data.description || data.lore_notes) {
                    html += `<div class="shud-section-title">Notes</div><div style="font-size:11px;color:#7a9a8a;margin-bottom:8px">${escapeHtml(data.description || data.lore_notes)}</div>`;
                }

                // Discoveries
                const discs = data.discoveries || [];
                if (discs.length) {
                    const EMOJI_MAP = { fauna:'🦗', flora:'🌿', mineral:'💎', starship:'🚀', multitool:'⚙️', ancient:'🏛️', bones:'🦴' };
                    html += `<div class="shud-section-title">Discoveries (${discs.length})</div>`;
                    discs.forEach(d => {
                        const emoji = EMOJI_MAP[d.discovery_type] || '📖';
                        let meta = '';
                        if (d.type_metadata) {
                            try {
                                const tm = typeof d.type_metadata === 'string' ? JSON.parse(d.type_metadata) : d.type_metadata;
                                const parts = [tm.species_name, tm.behavior, tm.resource_type, tm.deposit_richness,
                                    tm.ship_type, tm.ship_class, tm.tool_type, tm.age_era,
                                    tm.associated_race, tm.species_type, tm.estimated_age].filter(Boolean);
                                meta = parts.map(escapeHtml).join(' · ');
                            } catch {}
                        }
                        html += `<div class="shud-disc-card">`;
                        html += `<div class="shud-disc-name">${emoji} ${escapeHtml(d.discovery_name || d.name || 'Unnamed')}</div>`;
                        if (meta) html += `<div class="shud-disc-meta">${meta}</div>`;
                        if (d.discovered_by) html += `<div class="shud-disc-meta">By: ${escapeHtml(d.discovered_by)}</div>`;
                        if (d.description)   html += `<div class="shud-disc-meta" style="color:#8a9aaa">${escapeHtml(d.description)}</div>`;
                        if (d.photo_url)     html += `<img src="${getPhotoUrl(d.photo_url)}" alt="" class="shud-disc-thumb" onerror="this.style.display='none'">`;
                        html += `</div>`;
                    });
                }
            }

            content.innerHTML = html;
            hud.style.display = 'flex';
        }

        // ===== DISCOVERIES MODAL =====

        let currentDiscoveries = [], currentDiscoveryLocation = '', currentFilter = 'all';

        const DISC_CATEGORIES = {
            '🦴': { name: 'Ancient Bones & Fossils', order: 1 },
            '📜': { name: 'Text Logs & Documents',   order: 2 },
            '🏛️': { name: 'Ancient Ruins',            order: 3 },
            '👽': { name: 'Alien Structures',         order: 4 },
            '🌿': { name: 'Flora',                    order: 5 },
            '🦗': { name: 'Fauna',                    order: 6 },
            '💎': { name: 'Rare Resources',           order: 7 },
            '🚀': { name: 'Crashed Ships & Wrecks',   order: 8 },
            '⚙️': { name: 'Alien Technology',         order: 9 },
            '🆕': { name: 'NMS Update Content',       order: 10 },
            '📖': { name: 'Player-Created Lore',      order: 11 },
        };
        const DISC_EMOJIS = Object.keys(DISC_CATEGORIES);

        function buildFilterBar() {
            const bar = document.getElementById('discovery-filter-bar');
            if (!bar) return;
            let html = `<button class="discovery-filter-btn discovery-filter-all${currentFilter === 'all' ? ' active' : ''}" onclick="setDiscoveryFilter('all')" title="Show All">All</button>`;
            DISC_EMOJIS.forEach(e => {
                const count = currentDiscoveries.filter(d => d.discovery_type === e).length;
                html += `<button class="discovery-filter-btn${count === 0 ? ' empty' : ''}${currentFilter === e ? ' active' : ''}" onclick="setDiscoveryFilter('${e}')" title="${escapeHtml(DISC_CATEGORIES[e].name)}">${e}`;
                if (count > 0) html += `<span class="count-badge">${count}</span>`;
                html += `</button>`;
            });
            bar.innerHTML = html;
        }

        function setDiscoveryFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.discovery-filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderDiscoveries();
        }

        function renderDiscoveries() {
            const body  = document.getElementById('discoveries-modal-body');
            const title = document.getElementById('discoveries-modal-title');
            const filtered = currentFilter === 'all'
                ? currentDiscoveries
                : currentDiscoveries.filter(d => d.discovery_type === currentFilter);
            title.textContent = currentFilter === 'all'
                ? `Discoveries on ${currentDiscoveryLocation}`
                : `${currentFilter} ${DISC_CATEGORIES[currentFilter]?.name || ''} on ${currentDiscoveryLocation}`;
            body.innerHTML = filtered.length
                ? buildDiscModalContent(filtered)
                : '<div class="no-discoveries">No discoveries recorded for this location yet.</div>';
        }

        function openDiscoveriesFromCache(key) {
            const c = window._discoveryCache?.[key];
            if (c) openDiscoveriesModal(c.discoveries, c.name);
        }
        function openDiscoveriesModal(discoveries, locationName) {
            currentDiscoveries = discoveries || [];
            currentDiscoveryLocation = locationName || 'Unknown Location';
            currentFilter = 'all';
            buildFilterBar();
            renderDiscoveries();
            document.getElementById('discoveries-modal').classList.add('active');
        }
        function closeDiscoveriesModal() {
            document.getElementById('discoveries-modal').classList.remove('active');
        }

        function buildDiscModalContent(discoveries) {
            const grouped = {};
            discoveries.forEach(d => {
                const e = d.discovery_type || '';
                const key = DISC_CATEGORIES[e] ? e : 'unknown';
                grouped[key] = grouped[key] || {
                    emoji: DISC_CATEGORIES[e] ? e : '❓',
                    name: DISC_CATEGORIES[e]?.name || 'Unknown Type',
                    order: DISC_CATEGORIES[e]?.order || 99,
                    items: []
                };
                grouped[key].items.push(d);
            });
            return Object.entries(grouped).sort((a,b) => a[1].order - b[1].order).map(([, data]) => {
                let html = `<div class="discovery-category"><div class="discovery-category-header"><h3>${data.emoji} ${escapeHtml(data.name)}</h3><span class="discovery-category-count">${data.items.length}</span></div>`;
                data.items.forEach(d => { html += buildDiscCard(d); });
                return html + '</div>';
            }).join('');
        }

        function buildDiscCard(disc) {
            const e = disc.discovery_type || '';
            const displayType = DISC_CATEGORIES[e] ? `${e} ${DISC_CATEGORIES[e].name}` : (e || 'Unknown');
            let html = `<div class="discovery-card"><div class="discovery-card-header"><span class="discovery-type">${escapeHtml(displayType)}</span><span class="discovery-card-name">${escapeHtml(disc.discovery_name || disc.name || 'Unnamed')}</span></div><div class="discovery-card-details">`;
            if (disc.description)      html += `<p>${escapeHtml(disc.description)}</p>`;
            if (disc.discovered_by)    html += `<p><span class="detail-label">Discovered by:</span> ${escapeHtml(disc.discovered_by)}</p>`;
            if (disc.submission_timestamp) {
                const dt = new Date(disc.submission_timestamp);
                html += `<p><span class="detail-label">Date:</span> ${escapeHtml(isNaN(dt) ? disc.submission_timestamp : dt.toLocaleDateString())}</p>`;
            }
            if (disc.location_name) html += `<p><span class="detail-label">Location:</span> ${escapeHtml(disc.location_name)}</p>`;
            if (disc.photo_url)     html += `<img src="${getPhotoUrl(disc.photo_url)}" alt="" style="max-width:100%;border-radius:8px;margin-top:8px;">`;
            if (disc.evidence_url) {
                const urls = disc.evidence_url.split(',').map(s => s.trim()).filter(Boolean);
                if (urls.length) {
                    html += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">`;
                    urls.forEach(u => { html += `<img src="${getPhotoUrl(u)}" alt="Evidence" style="max-width:120px;border-radius:6px;cursor:pointer;" onclick="window.open('${getPhotoUrl(u)}','_blank')">`; });
                    html += `</div>`;
                }
            }
            html += `</div></div>`;
            return html;
        }

        document.getElementById('discoveries-modal').addEventListener('click', function(e) {
            if (e.target === this) closeDiscoveriesModal();
        });

        document.addEventListener('DOMContentLoaded', init);
        if (document.readyState === 'complete') init();
    </script>
</body>
</html>
